<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team. Ohana Studio</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ff7a00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TO Studio" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --orange: #ff7a00;
      --orange-hover: #e56e00;
      --bg: #f5f5f7;
      --tab-inactive-bg: #e4e4e6;
      --tab-inactive-text: #3a3a3c;
      --header-height: 72px;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ヘッダー ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: rgba(245, 245, 247, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: -0.5px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      color: #1c1c1e;
      white-space: nowrap;
    }

    .logo-text span {
      color: var(--orange);
    }

    /* ── タブバー ── */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(228, 228, 230, 0.6);
      border-radius: 100px;
      padding: 4px;
    }

    .tab-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
      white-space: nowrap;
      background: transparent;
      color: var(--tab-inactive-text);
    }

    .tab-btn:hover:not(.active) {
      background: rgba(255, 122, 0, 0.12);
      color: var(--orange);
    }

    .tab-btn:active {
      transform: scale(0.97);
    }

    .tab-btn.active {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 2px 8px rgba(255, 122, 0, 0.35);
    }

    /* ── iframeエリア ── */
    .iframe-container {
      position: fixed;
      top: var(--header-height);
      left: 0;
      right: 0;
      bottom: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: #fff;
    }

    iframe.active {
      display: block;
    }

    /* ── モバイル対応 ── */
    @media (max-width: 600px) {
      header {
        padding: 0 12px;
        gap: 10px;
      }

      .logo-text {
        font-size: 14px;
      }

      .tab-btn {
        padding: 7px 14px;
        font-size: 13px;
      }

      .tab-bar {
        gap: 4px;
        padding: 3px;
      }
    }

    @media (max-width: 420px) {
      .logo-text {
        display: none;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">TO</div>
    <div class="logo-text">Team. Ohana <span>Studio</span> <small style="font-size:11px; font-weight:400; color:#999; letter-spacing:0;">v2.0</small></div>
  </div>

  <div class="tab-bar" role="tablist">
    <button class="tab-btn" role="tab" data-tab="image_editor" aria-selected="false">画像editer</button>
    <button class="tab-btn" role="tab" data-tab="pdf2img"      aria-selected="false">PDF→画像</button>
    <button class="tab-btn" role="tab" data-tab="p_builder"    aria-selected="false">プロンプト</button>
    <button class="tab-btn" role="tab" data-tab="renamer"      aria-selected="false">リネーマー</button>
  </div>
</header>

<div class="iframe-container">
  <iframe
    id="iframe-image_editor"
    src="https://orangemark0808-code.github.io/Image_Gen/image_editor/"
    title="画像editer"
    allow="clipboard-read; clipboard-write"
  ></iframe>
  <iframe
    id="iframe-pdf2img"
    src="https://orangemark0808-code.github.io/Image_Gen/pdf2img/"
    title="PDF→画像"
    allow="clipboard-read; clipboard-write"
  ></iframe>
  <iframe
    id="iframe-p_builder"
    src="https://orangemark0808-code.github.io/Image_Gen/p_builder/"
    title="プロンプト"
    allow="clipboard-read; clipboard-write"
  ></iframe>
  <iframe
    id="iframe-renamer"
    src="https://orangemark0808-code.github.io/Image_Gen/orange-renamer/"
    title="リネーマー"
    allow="clipboard-read; clipboard-write"
  ></iframe>
</div>

<script>
  const APP_VERSION = '2026-06-03-01';
  const STORAGE_KEY = 'ohana-studio-active-tab';
  const DEFAULT_TAB = 'image_editor';

  const tabs = document.querySelectorAll('.tab-btn');
  const iframes = document.querySelectorAll('iframe');

  function switchTab(tabId) {
    tabs.forEach(btn => {
      const isActive = btn.dataset.tab === tabId;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });

    iframes.forEach(iframe => {
      const isActive = iframe.id === `iframe-${tabId}`;
      iframe.classList.toggle('active', isActive);
    });

    try {
      localStorage.setItem(STORAGE_KEY, tabId);
    } catch (_) {}
  }

  tabs.forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // 前回選択したタブを復元、なければデフォルト
  let savedTab = DEFAULT_TAB;
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored && document.getElementById(`iframe-${stored}`)) {
      savedTab = stored;
    }
  } catch (_) {}

  switchTab(savedTab);

  // Service Worker 登録
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
